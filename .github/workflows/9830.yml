name: Build FKZ Recovery for Exynos 990
on:
  workflow_dispatch:
jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target: [x1s, y2s, z3s, c1s, c2s, r8s]
    steps:
    - name: Check Out
      uses: actions/checkout@v4
    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main
    - name: Prepare the environment
      run: |
        sudo apt update && sudo apt upgrade -y
        DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            linux-modules-extra-$(uname -r) \
            gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib \
            libc6-dev lib32ncurses-dev x11proto-core-dev libx11-dev tree lib32z-dev libgl1-mesa-dev libxml2-utils \
            xsltproc bc ccache lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev \
            build-essential libgtk-3-dev libglu1-mesa-dev freeglut3-dev git libxml2 lzop pngcrush schedtool squashfs-tools \
            imagemagick libbz2-dev lzma ncftp qemu-user-static libstdc++-10-dev libncurses6 python3 tar
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'latest'
    - name: Install OpenJDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'
    - name: Install repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo
    - name: Initialize repo
      run: |
        mkdir workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
      id: pwd
    - name: Repo Sync
      run: |
        repo sync -j$(nproc --all) --force-sync
      working-directory: workspace
    - name: Clone device tree
      run: |
        git clone https://github.com/Android-Artisan/android_device_samsung_exynos990.git -b android-12.1 ./device/samsung/exynos990
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
    - name: Apply FKZ Recovery Branding
      run: |
        # Schimba numele in toate fisierele de limba
        find bootable/recovery -name "*.xml" -exec sed -i 's/Team Win Recovery Project/FKZ Recovery/g' {} \; 2>/dev/null || true
        find bootable/recovery/gui/theme -name "*.xml" -exec sed -i 's/>TWRP</>FKZ Recovery</g' {} \; 2>/dev/null || true

        # Schimba culorile la rosu/negru
        find bootable/recovery/gui/theme -name "ui.xml" | while read f; do
          sed -i 's/#0090CA/#CC0000/g' "
